<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otium — Discover What You Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #ffffff;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#canvas {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #ffffff;
}

/* Subtle animated gradient background */
#bg-gradient {
  position: absolute;
  inset: 0;
  opacity: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(59,130,246,0.04) 0%, transparent 70%);
  transition: opacity 2s ease;
  z-index: 0;
}

/* Floating particle dots */
.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(59,130,246,0.12);
  pointer-events: none;
  z-index: 0;
}

/* Scene container base */
.scene {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  z-index: 1;
  pointer-events: none;
}

/* Typography */
.hero-text {
  font-size: clamp(28px, 3.5vw, 56px);
  font-weight: 300;
  color: #1d1d1f;
  text-align: center;
  line-height: 1.3;
  letter-spacing: -0.02em;
  max-width: 800px;
  padding: 0 40px;
}

.hero-text-sm {
  font-size: clamp(18px, 2vw, 32px);
  font-weight: 400;
  color: #6e6e73;
  text-align: center;
  line-height: 1.5;
  max-width: 700px;
  padding: 0 40px;
}

/* Scene 3: Logo reveal */
#scene3 .logo-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

#scene3 .logo-glow {
  position: absolute;
  width: 200px;
  height: 200px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  border-radius: 50%;
  opacity: 0;
  filter: blur(30px);
  transition: opacity 1.5s ease;
}

#scene3 .logo-img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  position: relative;
  z-index: 1;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
}

#scene3 .logo-img.visible {
  opacity: 1;
  transform: scale(1);
}

#scene3 .intro-label {
  font-size: clamp(20px, 2.5vw, 40px);
  font-weight: 600;
  color: #1d1d1f;
  letter-spacing: -0.02em;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

#scene3 .intro-label.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Scene 4: App mockup */
#scene4 {
  padding: 0;
}

.app-mockup {
  width: min(90vw, 440px);
  height: min(80vh, 680px);
  background: #f5f5f7;
  border-radius: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transform: translateY(40px);
  opacity: 0;
  transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.9s ease;
  position: relative;
}

.app-mockup.visible {
  transform: translateY(0);
  opacity: 1;
}

.app-header {
  padding: 20px 24px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #ffffff;
  border-bottom: 1px solid #e5e5ea;
}

.app-header-logo {
  width: 28px;
  height: 28px;
  object-fit: contain;
}

.app-header-title {
  font-size: 17px;
  font-weight: 600;
  color: #1d1d1f;
}

.app-header-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #34c759;
  margin-left: -4px;
}

.chat-area {
  flex: 1;
  padding: 16px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow: hidden;
  background: #ffffff;
}

.msg {
  max-width: 82%;
  padding: 12px 16px;
  border-radius: 20px;
  font-size: 15px;
  line-height: 1.45;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.msg.visible {
  opacity: 1;
  transform: translateY(0);
}

.msg-user {
  align-self: flex-end;
  background: #3b82f6;
  color: #ffffff;
  border-bottom-right-radius: 6px;
}

.msg-ai {
  align-self: flex-start;
  background: #f0f0f5;
  color: #1d1d1f;
  border-bottom-left-radius: 6px;
}

.msg-ai .typing-cursor {
  display: inline-block;
  width: 2px;
  height: 14px;
  background: #3b82f6;
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.6s step-end infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* Journey card */
.journey-card {
  margin: 4px 0;
  background: #f5f5f7;
  border-radius: 16px;
  padding: 16px;
  border: 1px solid #e5e5ea;
  opacity: 0;
  transform: translateY(16px) scale(0.97);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.journey-card.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.journey-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.journey-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.journey-title {
  font-size: 15px;
  font-weight: 600;
  color: #1d1d1f;
}

.journey-sub {
  font-size: 12px;
  color: #86868b;
  font-weight: 400;
}

.day-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-top: 1px solid #ebebf0;
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.day-item.visible {
  opacity: 1;
  transform: translateX(0);
}

.day-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid #d1d1d6;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.day-check.checked {
  border-color: #34c759;
  background: #34c759;
}

.day-check.checked::after {
  content: '✓';
  color: white;
  font-size: 12px;
  font-weight: 700;
}

.day-label {
  font-size: 14px;
  color: #1d1d1f;
}

.day-label span {
  font-weight: 600;
}

/* Scene 5: Promise */
#scene5 .emoji-field {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-top: 32px;
  max-width: 600px;
}

.emoji-item {
  font-size: clamp(28px, 3vw, 44px);
  opacity: 0;
  transform: translateY(20px) scale(0.7);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.emoji-item.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.hobby-list {
  font-size: clamp(14px, 1.4vw, 20px);
  color: #86868b;
  text-align: center;
  margin-top: 24px;
  opacity: 0;
  transition: opacity 0.8s ease;
  letter-spacing: 0.02em;
}

.hobby-list.visible { opacity: 1; }

/* Scene 6: CTA */
#scene6 .cta-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#scene6 .cta-logo {
  width: 80px;
  height: 80px;
  object-fit: contain;
  opacity: 0;
  transform: scale(0.85);
  transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
}

#scene6 .cta-logo.visible {
  opacity: 1;
  transform: scale(1);
}

#scene6 .cta-tagline {
  font-size: clamp(24px, 3vw, 48px);
  font-weight: 600;
  color: #1d1d1f;
  letter-spacing: -0.03em;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
}

#scene6 .cta-tagline.visible {
  opacity: 1;
  transform: translateY(0);
}

#scene6 .cta-url {
  font-size: clamp(14px, 1.4vw, 20px);
  color: #3b82f6;
  font-weight: 500;
  letter-spacing: 0.04em;
  opacity: 0;
  transition: opacity 0.8s ease 0.6s;
}

#scene6 .cta-url.visible { opacity: 1; }

#scene6 .cta-glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0;
  transition: opacity 2s ease;
  z-index: 0;
}

#scene6 .cta-glow.visible { opacity: 1; }

/* Fade utility */
.fade-in {
  animation: fadeIn 1s ease forwards;
}

.fade-out {
  animation: fadeOut 0.8s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}
</style>
</head>
<body>
<div id="canvas">
  <!-- Subtle background gradient -->
  <div id="bg-gradient"></div>

  <!-- Particles will be injected by JS -->

  <!-- Scene 1: The Hook -->
  <div class="scene" id="scene1">
    <p class="hero-text">You've always wanted to<br>learn something new</p>
  </div>

  <!-- Scene 2: The Feeling -->
  <div class="scene" id="scene2">
    <p class="hero-text">But you never knew<br>where to start</p>
  </div>

  <!-- Scene 3: Introducing -->
  <div class="scene" id="scene3">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <img class="logo-img" src="/images/otium-mark.png" alt="Otium">
      <span class="intro-label">Introducing Otium</span>
    </div>
  </div>

  <!-- Scene 4: Product in Action -->
  <div class="scene" id="scene4">
    <div class="app-mockup" id="appMockup">
      <div class="app-header">
        <img class="app-header-logo" src="/images/otium-mark.png" alt="">
        <span class="app-header-title">Otium</span>
        <span class="app-header-dot"></span>
      </div>
      <div class="chat-area" id="chatArea">
        <!-- Messages injected by JS -->
      </div>
    </div>
  </div>

  <!-- Scene 5: The Promise -->
  <div class="scene" id="scene5">
    <p class="hero-text" style="margin-bottom:0">Your personal AI guide<br>to any hobby</p>
    <div class="emoji-field" id="emojiField"></div>
    <p class="hobby-list" id="hobbyList">Photography · Guitar · Cooking · Yoga · Chess · and hundreds more</p>
  </div>

  <!-- Scene 6: CTA -->
  <div class="scene" id="scene6">
    <div class="cta-glow"></div>
    <div class="cta-container">
      <img class="cta-logo" src="/images/otium-mark.png" alt="Otium">
      <span class="cta-tagline">Discover What You Love</span>
      <span class="cta-url">otiumapp.com</span>
    </div>
  </div>
</div>

<script>
// ── Utilities ──────────────────────────────────────────────
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function fadeScene(el, show) {
  return new Promise(resolve => {
    if (show) {
      el.style.opacity = '0';
      el.style.display = 'flex';
      requestAnimationFrame(() => {
        el.style.transition = 'opacity 0.9s ease';
        el.style.opacity = '1';
      });
      setTimeout(resolve, 900);
    } else {
      el.style.transition = 'opacity 0.7s ease';
      el.style.opacity = '0';
      setTimeout(() => { resolve(); }, 700);
    }
  });
}

// ── Particles ──────────────────────────────────────────────
function createParticles() {
  const canvas = document.getElementById('canvas');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.opacity = '0';
    p.style.transition = `opacity ${2 + Math.random() * 3}s ease`;
    canvas.appendChild(p);
    // Gentle float animation
    const dur = 15 + Math.random() * 20;
    const dx = -30 + Math.random() * 60;
    const dy = -30 + Math.random() * 60;
    p.animate([
      { transform: 'translate(0, 0)' },
      { transform: `translate(${dx}px, ${dy}px)` },
      { transform: 'translate(0, 0)' }
    ], { duration: dur * 1000, iterations: Infinity, easing: 'ease-in-out' });
    setTimeout(() => { p.style.opacity = String(0.15 + Math.random() * 0.2); }, 500 + Math.random() * 2000);
  }
}

// ── Typing effect ──────────────────────────────────────────
function typeText(el, text, speed = 30) {
  return new Promise(resolve => {
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';
    el.textContent = '';
    el.appendChild(cursor);
    const interval = setInterval(() => {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
      } else {
        clearInterval(interval);
        if (cursor.parentNode) cursor.remove();
        resolve();
      }
    }, speed);
  });
}

// ── Scene 4: Build chat ────────────────────────────────────
async function playScene4() {
  const scene = document.getElementById('scene4');
  const mockup = document.getElementById('appMockup');
  const chat = document.getElementById('chatArea');

  await fadeScene(scene, true);
  await delay(200);

  // Show mockup
  mockup.classList.add('visible');
  await delay(700);

  // User message
  const userMsg = document.createElement('div');
  userMsg.className = 'msg msg-user';
  userMsg.textContent = 'I want to learn guitar 🎸';
  chat.appendChild(userMsg);
  await delay(100);
  userMsg.classList.add('visible');
  await delay(600);

  // AI response with typing
  const aiMsg = document.createElement('div');
  aiMsg.className = 'msg msg-ai';
  chat.appendChild(aiMsg);
  await delay(100);
  aiMsg.classList.add('visible');
  await delay(300);
  await typeText(aiMsg, "Great choice — guitar is one of the most rewarding instruments to learn, let me build your personal journey", 22);
  await delay(500);

  // Journey card
  const card = document.createElement('div');
  card.className = 'journey-card';
  card.innerHTML = `
    <div class="journey-card-header">
      <div class="journey-icon">🎸</div>
      <div>
        <div class="journey-title">Your Guitar Journey</div>
        <div class="journey-sub">30 days · Beginner</div>
      </div>
    </div>
    <div id="dayItems"></div>
  `;
  chat.appendChild(card);
  await delay(100);
  card.classList.add('visible');
  await delay(500);

  // Day items
  const days = [
    { day: 1, label: 'Meet Your Guitar' },
    { day: 2, label: 'Your First Chord: Em' },
    { day: 3, label: 'Strumming Basics' },
  ];
  const dayContainer = document.getElementById('dayItems');

  for (let d of days) {
    const item = document.createElement('div');
    item.className = 'day-item';
    item.innerHTML = `<div class="day-check"></div><div class="day-label"><span>Day ${d.day}</span> — ${d.label}</div>`;
    dayContainer.appendChild(item);
    await delay(150);
    item.classList.add('visible');
    await delay(250);
  }

  await delay(400);

  // Check off first two days
  const checks = dayContainer.querySelectorAll('.day-check');
  checks[0].classList.add('checked');
  await delay(400);
  checks[1].classList.add('checked');
  await delay(600);

  // Fade out
  await fadeScene(scene, false);
}

// ── Main timeline ──────────────────────────────────────────
async function play() {
  createParticles();
  const bg = document.getElementById('bg-gradient');

  // Scene 1: The Hook (0-4s)
  const s1 = document.getElementById('scene1');
  await delay(400);
  await fadeScene(s1, true);
  bg.style.opacity = '1';
  await delay(2600);
  await fadeScene(s1, false);
  await delay(300);

  // Scene 2: The Feeling (4-8s)
  const s2 = document.getElementById('scene2');
  await fadeScene(s2, true);
  await delay(2600);
  await fadeScene(s2, false);
  await delay(300);

  // Scene 3: Introducing (8-13s)
  const s3 = document.getElementById('scene3');
  await fadeScene(s3, true);
  await delay(400);
  const logoImg = s3.querySelector('.logo-img');
  const logoGlow = s3.querySelector('.logo-glow');
  const introLabel = s3.querySelector('.intro-label');
  logoGlow.style.opacity = '1';
  await delay(300);
  logoImg.classList.add('visible');
  await delay(700);
  introLabel.classList.add('visible');
  await delay(2200);
  await fadeScene(s3, false);
  await delay(300);

  // Scene 4: Product in Action (13-20s)
  await playScene4();
  await delay(200);

  // Scene 5: The Promise (20-25s)
  const s5 = document.getElementById('scene5');
  await fadeScene(s5, true);
  await delay(600);

  // Emoji pop-in
  const emojis = ['📸','🎸','🎨','🧘','♟️','🏄','🎹','👨‍🍳'];
  const emojiField = document.getElementById('emojiField');
  for (let e of emojis) {
    const span = document.createElement('span');
    span.className = 'emoji-item';
    span.textContent = e;
    emojiField.appendChild(span);
  }
  await delay(100);
  const emojiEls = emojiField.querySelectorAll('.emoji-item');
  for (let i = 0; i < emojiEls.length; i++) {
    setTimeout(() => emojiEls[i].classList.add('visible'), i * 100);
  }
  await delay(emojis.length * 100 + 400);

  const hobbyList = document.getElementById('hobbyList');
  hobbyList.classList.add('visible');
  await delay(1800);
  await fadeScene(s5, false);
  await delay(300);

  // Scene 6: CTA (25-30s)
  const s6 = document.getElementById('scene6');
  const ctaGlow = s6.querySelector('.cta-glow');
  const ctaLogo = s6.querySelector('.cta-logo');
  const ctaTagline = s6.querySelector('.cta-tagline');
  const ctaUrl = s6.querySelector('.cta-url');

  await fadeScene(s6, true);
  ctaGlow.classList.add('visible');
  await delay(200);
  ctaLogo.classList.add('visible');
  ctaTagline.classList.add('visible');
  ctaUrl.classList.add('visible');

  // Hold for finish
  await delay(4000);
}

// Auto-start
window.addEventListener('load', () => {
  const canvas = document.getElementById('canvas');
  
  setTimeout(async () => {
    await play();
    
    // Show download button after ad finishes
    setTimeout(() => {
      const btn = document.createElement('button');
      btn.textContent = '⬇ Download Video';
      btn.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);padding:16px 32px;background:#3b82f6;color:white;border:none;border-radius:12px;font-size:18px;font-weight:600;font-family:Inter,sans-serif;cursor:pointer;z-index:9999;box-shadow:0 4px 20px rgba(59,130,246,0.4)';
      btn.onclick = async () => {
        try {
          const captureStream = canvas.captureStream ? canvas.captureStream(30) : null;
          if (!captureStream) {
            btn.textContent = 'Use screen recording instead';
            return;
          }
          const rec = new MediaRecorder(captureStream, { 
            mimeType: MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm'
          });
          const parts = [];
          rec.ondataavailable = (e) => { if (e.data.size > 0) parts.push(e.data); };
          rec.onstop = () => {
            const blob = new Blob(parts, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const dl = document.createElement('a');
            dl.href = url;
            dl.download = 'otium-ad-desktop-16x9.webm';
            document.body.appendChild(dl);
            dl.click();
            dl.remove();
            URL.revokeObjectURL(url);
            btn.textContent = '⬇ Download Video';
          };
          
          btn.textContent = 'Recording... wait 30s';
          rec.start();
          
          // Reset and replay
          document.querySelectorAll('.scene').forEach(s => { s.style.opacity = '0'; });
          document.querySelectorAll('.visible').forEach(el => el.classList.remove('visible'));
          document.getElementById('chatArea').innerHTML = '';
          document.getElementById('emojiField').innerHTML = '';
          
          await play();
          await new Promise(r => setTimeout(r, 500));
          rec.stop();
        } catch(err) {
          btn.textContent = 'Error: ' + err.message;
        }
      };
      document.body.appendChild(btn);
    }, 500);
  }, 300);
});
</script>
</body>
</html>
